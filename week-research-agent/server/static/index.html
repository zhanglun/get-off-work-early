<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Research Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 30px 0 20px;
        }
        header h1 { font-size: 28px; }
        header p { color: #6e6e73; margin-top: 8px; }

        .input-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }
        .input-row { display: flex; gap: 12px; }
        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: #0071e3; }
        button {
            padding: 14px 28px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover { background: #005bb5; }
        button:disabled { background: #a0c4eb; cursor: not-allowed; }

        .suggestions {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .suggestions span {
            font-size: 13px;
            color: #6e6e73;
        }
        .chip {
            padding: 4px 12px;
            background: #f0f0f5;
            border-radius: 16px;
            font-size: 13px;
            color: #0071e3;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chip:hover { background: #e0e0f0; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6e6e73;
        }
        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #0071e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .report-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .report-card h2 { font-size: 20px; margin-bottom: 20px; }
        .section { margin-bottom: 24px; }
        .section-title {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .summary { font-size: 16px; }

        ol.key-points { padding-left: 20px; }
        ol.key-points li { margin-bottom: 8px; }

        .sources { list-style: none; }
        .sources li {
            padding: 6px 0;
            font-size: 14px;
            color: #0071e3;
            word-break: break-all;
        }

        .confidence {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
        }
        .conf-high { background: #d4f4dd; color: #1a7d3e; }
        .conf-medium { background: #fff3cd; color: #856404; }
        .conf-low { background: #f8d7da; color: #721c24; }

        .metadata {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #6e6e73;
        }
        .tool-trace { margin-top: 12px; }
        .tool-trace div {
            padding: 4px 0;
            font-family: "SF Mono", Monaco, monospace;
            font-size: 12px;
        }
        .tool-ok { color: #1a7d3e; }
        .tool-fail { color: #c0392b; }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 16px;
            border-radius: 8px;
        }

        /* Day 8 历史对话区 */
        #history-list {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        #history-list::before {
            content: "📚 本次会话历史（Agent 记得这些）";
            display: block;
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .history-item {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
        }
        .history-item:last-child { border-bottom: none; }
        .history-role { flex-shrink: 0; }
        .history-text { color: #1d1d1f; }

        /* Day 9 流式进度区 */
        .stream-log {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 13px;
            line-height: 1.8;
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
            background: #fafafa;
            border-radius: 8px;
            margin: 16px 0;
        }
        .stream-item { padding: 2px 0; color: #1d1d1f; }
        .stream-phase { font-weight: 600; color: #0071e3; margin-top: 8px; }
        .stream-step { color: #6e6e73; font-size: 12px; }
        .stream-result.ok { color: #1a7d3e; }
        .stream-result.fail { color: #c0392b; }
        .stream-warn { color: #856404; }
        .stream-info { color: #6e6e73; font-size: 12px; }
        .loading { text-align: center; padding: 20px; color: #6e6e73; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🔬 Research Agent</h1>
        <p>给我一个课题，我帮你联网研究并生成报告</p>
    </header>

    <div class="input-card">
        <div class="input-row">
            <input type="text" id="topic" placeholder="输入研究课题，如：LangChain 是什么" />
            <button id="submit" onclick="doResearch()">研究</button>
        </div>
        <div class="suggestions">
            <span>试试：</span>
            <span class="chip" onclick="fill('LangChain 是什么')">LangChain 是什么</span>
            <span class="chip" onclick="fill('React 和 Vue 有什么区别')">React vs Vue</span>
            <span class="chip" onclick="fill('2026 年最新的 AI 模型')">2026 AI 模型</span>
        </div>
    </div>

    <div id="result"></div>

    <div id="history-section" style="margin-top: 24px;">
        <div id="history-list" style="display:none;"></div>
    </div>
</div>

<script>
// 页面加载时显示历史
loadHistory();
</script>

<script>
// Day 8 Session Memory：前端管理 session_id
// 存在 localStorage，刷新页面也不丢，浏览器关了才丢（=会话级）
function getSessionId() {
    let sid = localStorage.getItem('research_session_id');
    if (!sid) {
        sid = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        localStorage.setItem('research_session_id', sid);
    }
    return sid;
}

// 显示历史对话记录（Session Memory 的可见化）
function loadHistory() {
    const history = JSON.parse(localStorage.getItem('research_history') || '[]');
    if (history.length === 0) return;
    const list = document.getElementById('history-list');
    list.innerHTML = history.map(h =>
        `<div class="history-item">
            <span class="history-role">${h.role === 'user' ? '🧑' : '🤖'}</span>
            <span class="history-text">${escapeHtml(h.text.slice(0, 50))}${h.text.length > 50 ? '...' : ''}</span>
        </div>`
    ).join('');
    list.style.display = 'block';
}

function appendHistory(role, text) {
    const history = JSON.parse(localStorage.getItem('research_history') || '[]');
    history.push({ role, text });
    // 最多保留 20 条，避免无限增长
    if (history.length > 20) history.shift();
    localStorage.setItem('research_history', JSON.stringify(history));
    loadHistory();
}

function fill(topic) {
    document.getElementById('topic').value = topic;
}

async function doResearch() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) { alert('请输入课题'); return; }

    const btn = document.getElementById('submit');
    const result = document.getElementById('result');

    btn.disabled = true;

    // Day 9：用 SSE 流式接收，实时显示进度
    const sessionId = getSessionId();
    const url = `/api/research/stream?topic=${encodeURIComponent(topic)}&session_id=${encodeURIComponent(sessionId)}`;

    // 先显示进度区
    result.innerHTML = `
        <div class="report-card">
            <h2>🔬 正在研究：${escapeHtml(topic)}</h2>
            <div id="stream-log" class="stream-log"></div>
            <div id="stream-spinner" class="loading">
                <div class="spinner"></div>
                <p>Agent 工作中...</p>
            </div>
        </div>
    `;
    const streamLog = document.getElementById('stream-log');

    const eventSource = new EventSource(url);

    eventSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const evt = data.event;

        if (evt === 'done') {
            eventSource.close();
            // 存历史
            appendHistory('user', topic);
            const answer = data.report?.summary || '(研究完成)';
            appendHistory('assistant', answer);
            // 渲染最终报告
            result.innerHTML = renderReport({
                topic, report: data.report, metadata: {status: data.status},
                session_id: data.session_id
            });
            loadHistory();
            btn.disabled = false;
        } else if (evt === 'fatal_error') {
            eventSource.close();
            result.innerHTML = `<div class="error">❌ ${escapeHtml(data.error)}</div>`;
            btn.disabled = false;
        } else if (evt === 'error') {
            appendStreamLog(`❌ ${data.phase} 出错：${escapeHtml(data.error || '')}`, 'fail');
        } else {
            // 各种进度事件
            appendStreamEvent(data, streamLog);
        }
    };

    eventSource.onerror = () => {
        eventSource.close();
        btn.disabled = false;
    };
}

function appendStreamEvent(data, container) {
    const evt = data.event;
    let html = '';

    if (evt === 'phase') {
        const label = data.phase === 'research' ? '🔍 开始研究' : '📊 生成报告';
        html = `<div class="stream-item stream-phase">${label}</div>`;
    } else if (evt === 'history') {
        html = `<div class="stream-item stream-info">📚 加载历史 ${data.count} 条</div>`;
    } else if (evt === 'step') {
        html = `<div class="stream-item stream-step">— 第 ${data.step} 步 —</div>`;
    } else if (evt === 'tool_start') {
        if (data.tool === 'search_web') {
            html = `<div class="stream-item">🔎 搜索：<b>${escapeHtml(data.query)}</b></div>`;
        } else if (data.tool === 'fetch_url') {
            html = `<div class="stream-item">📖 读全文：<b>${escapeHtml(data.url)}</b></div>`;
        } else {
            html = `<div class="stream-item">🔧 ${escapeHtml(data.tool)}</div>`;
        }
    } else if (evt === 'tool_end') {
        const mark = data.success ? '✓' : '✗';
        const cls = data.success ? 'ok' : 'fail';
        let detail = '';
        if (data.tool === 'search_web') detail = `${data.count} 条结果`;
        else if (data.tool === 'fetch_url') detail = `${data.length} 字符`;
        html = `<div class="stream-item stream-result ${cls}">   ${mark} ${detail}（${data.elapsed}s）</div>`;
    } else if (evt === 'max_steps') {
        html = `<div class="stream-item stream-warn">⚠️ 达到最大步数 ${data.max_steps}</div>`;
    } else if (evt === 'phase_done') {
        if (data.phase === 'research') {
            html = `<div class="stream-item stream-info">📝 研究完成：${data.steps} 步，素材 ${data.findings_length} 字符</div>`;
        } else if (data.phase === 'report' && !data.skipped) {
            html = `<div class="stream-item stream-info">✓ 报告完成：${data.key_points} 条发现，confidence=${data.confidence}</div>`;
        }
    }

    if (html) {
        container.insertAdjacentHTML('beforeend', html);
        container.scrollTop = container.scrollHeight;
    }
}

function appendStreamLog(text, cls) {
    const container = document.getElementById('stream-log');
    if (!container) return;
    container.insertAdjacentHTML('beforeend', `<div class="stream-item ${cls}">${text}</div>`);
    container.scrollTop = container.scrollHeight;
}

function renderReport(data) {
    const r = data.report || {};
    const m = data.metadata;

    const summary = r.summary || '(无摘要)';
    const keyPoints = (r.key_points || []).map(p => `<li>${escapeHtml(p)}</li>`).join('');
    const sources = (r.sources || []).map(s => `<li>${escapeHtml(s)}</li>`).join('');
    const conf = r.confidence || 'unknown';
    const confClass = { high: 'conf-high', medium: 'conf-medium', low: 'conf-low' }[conf] || 'conf-low';
    const confText = { high: '🟢 高', medium: '🟡 中', low: '🔴 低' }[conf] || conf;

    const tools = (m.tool_calls || []).map(t => {
        const mark = t.success ? '✓' : '✗';
        const cls = t.success ? 'tool-ok' : 'tool-fail';
        const arg = typeof t.args === 'object' ? JSON.stringify(t.args) : t.args;
        return `<div class="${cls}">${mark} [${t.step}] ${t.tool}(${escapeHtml(arg)}) — ${t.elapsed}s</div>`;
    }).join('');

    return `
        <div class="report-card">
            <h2>📊 研究报告：${escapeHtml(data.topic)}</h2>

            <div class="section">
                <div class="section-title">📝 摘要</div>
                <div class="summary">${escapeHtml(summary)}</div>
            </div>

            ${keyPoints ? `
            <div class="section">
                <div class="section-title">🔑 关键发现</div>
                <ol class="key-points">${keyPoints}</ol>
            </div>` : ''}

            ${sources ? `
            <div class="section">
                <div class="section-title">📎 来源</div>
                <ul class="sources">${sources}</ul>
            </div>` : ''}

            <div class="section">
                <span class="confidence ${confClass}">置信度：${confText}</span>
            </div>

            <div class="metadata">
                ⏱ ${m.elapsed}s · 🔧 ${m.steps}步 · 状态：${m.status}
                ${tools ? `<div class="tool-trace">${tools}</div>` : ''}
            </div>
        </div>
    `;
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// 回车键提交
document.getElementById('topic').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doResearch();
});
</script>
</body>
</html>
